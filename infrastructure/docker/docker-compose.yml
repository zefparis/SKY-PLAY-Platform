services:
  postgres:
    container_name: skyplay_postgres
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: skyplay
      POSTGRES_PASSWORD: skyplay123
      POSTGRES_DB: skyplay_db
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skyplay"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    container_name: skyplay_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:

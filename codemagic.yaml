workflows:
  skyplay-ios:
    name: SKY PLAY iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      # integrations:
      #   app_store_connect: Codemagic  # re-enable when ASC account is active
      # ios_signing désactivé — en attente activation Apple Developer
      # ios_signing:
      #   distribution_type: app_store
      #   bundle_identifier: cloud.skyplay.app
      vars:
        XCODE_PROJECT: "apps/web/ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "apps/web/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        CAPACITOR_PLATFORM: "ios"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install workspace dependencies
        script: |
          npm install --no-audit --no-fund
          cd apps/web && npm install --no-audit --no-fund

      - name: Ensure iOS platform exists
        script: |
          cd apps/web
          if [ ! -d "ios" ]; then
            npm install --save @capacitor/ios
            CAPACITOR_PLATFORM=ios npx cap add ios
          fi

      - name: Capacitor sync iOS
        script: |
          cd apps/web
          CAPACITOR_PLATFORM=ios npx cap sync ios

      - name: Bump iOS deployment target to 14.0
        script: |
          cd apps/web/ios/App
          # Podfile: platform :ios, '...'  →  '14.0'
          if [ -f Podfile ]; then
            sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '14.0'/g" Podfile || true
          fi
          # pbxproj: IPHONEOS_DEPLOYMENT_TARGET = ...;
          if [ -f App.xcodeproj/project.pbxproj ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj || true
          fi
          echo "--- Podfile platform line ---"
          grep -n "platform :ios" Podfile || true
          echo "--- pbxproj deployment targets ---"
          grep -n "IPHONEOS_DEPLOYMENT_TARGET" App.xcodeproj/project.pbxproj | head -5 || true

      - name: Install CocoaPods
        script: |
          cd apps/web/ios/App
          pod install

      - name: Set bundle identifier
        script: |
          cd apps/web/ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier cloud.skyplay.app" App/Info.plist || true

      - name: Build iOS (no signing)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            build

    artifacts:
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - contact@ia-solution.fr
        notify:
          success: true
          failure: true
      # app_store_connect:
      #   auth: integration
      #   submit_to_testflight: true
      #   beta_groups:
      #     - Internal Testers

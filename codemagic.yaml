workflows:
  skyplay-ios:
    name: SKY PLAY iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      vars:
        XCODE_PROJECT: "apps/web/ios/App/App.xcodeproj"
        XCODE_WORKSPACE: "apps/web/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        CAPACITOR_PLATFORM: "ios"
      node: 20
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install workspace dependencies
        script: |
          npm install --no-audit --no-fund
          cd apps/web && npm install --no-audit --no-fund

      - name: Ensure iOS platform exists
        script: |
          cd apps/web
          if [ ! -d "ios" ]; then
            CAPACITOR_PLATFORM=ios npx cap add ios
          fi

      - name: Copy web assets to iOS
        script: |
          cd apps/web
          # cap copy uniquement — pas de pod install (séparé ci-dessous)
          CAPACITOR_PLATFORM=ios npx cap copy ios

      - name: Patch iOS deployment target
        script: |
          PODFILE="apps/web/ios/App/Podfile"
          PBXPROJ="apps/web/ios/App/App.xcodeproj/project.pbxproj"
          # Capacitor 8 requires iOS 15.0 minimum (Capacitor.podspec).
          # macOS sed uses `-i ''`, GNU sed uses `-i` — try both.
          sed -i '' "s/platform :ios, '[0-9.]*/platform :ios, '15.0/" "$PODFILE" 2>/dev/null || \
          sed -i "s/platform :ios, '[0-9.]*/platform :ios, '15.0/" "$PODFILE"
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" "$PBXPROJ" 2>/dev/null || \
          sed -i "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" "$PBXPROJ"
          echo "=== Podfile platform line ==="
          grep "platform :ios" "$PODFILE"
          echo "=== pbxproj deployment targets ==="
          grep "IPHONEOS_DEPLOYMENT_TARGET" "$PBXPROJ" | head -5

      - name: Install CocoaPods
        script: |
          cd apps/web/ios/App
          pod install --repo-update

      - name: Set bundle identifier
        script: |
          cd apps/web/ios/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier cloud.skyplay.app" App/Info.plist || true

      - name: Apply signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files cloud.skyplay.app \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build & sign IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - contact@ia-solution.fr
        notify:
          success: true
          failure: true
